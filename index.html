<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TubCorp // Public Space Governance Platform</title>
    <meta name="description" content="TubCorp provides end-to-end infrastructure for participatory public-space governance. Signal processing, inference governance, and operator deployment." />
    <script>
      ;(function (location) {
        if (location.search[1] !== '/') return
        const decoded = location.search
          .slice(1)
          .split('&')
          .map((entry) => entry.replace(/~and~/g, '&'))
          .join('?')
        window.history.replaceState(
          null,
          '',
          location.pathname.slice(0, -1) + decoded + location.hash,
        )
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
